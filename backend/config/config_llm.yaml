preferred_endpoint: ollama

endpoints:
  ollama:
    api_endpoint_env: OLLAMA_ENDPOINT
    llm_type: ollama
    models:
      # Built from backend/models/qwen2.5-7b-rank.Modelfile (top_k=1 -> greedy decoding).
      # NLWeb calls Ollama with temperature 0.7 and offers no way to override it,
      # which made every ranking score a fresh random draw.
      high: qwen2.5-7b-rank
      low: qwen2.5-7b-rank

  # Fallback a OpenAI si está disponible
  openai:
    api_key_env: OPENAI_API_KEY
    api_endpoint_env: OPENAI_ENDPOINT
    llm_type: openai
    models:
      high: gpt-4.1
      low: gpt-4.1-mini
